name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Install sharp (needed for asset generation)
        run: npm install -g sharp-cli

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Android icon sizes
        run: |
          install_icons() {
            SRC="public/icon-512.png"
            RES="android/app/src/main/res"

            declare -A SIZES=(
              ["mipmap-mdpi"]=48
              ["mipmap-hdpi"]=72
              ["mipmap-xhdpi"]=96
              ["mipmap-xxhdpi"]=144
              ["mipmap-xxxhdpi"]=192
            )

            for DIR in "${!SIZES[@]}"; do
              SIZE="${SIZES[$DIR]}"
              mkdir -p "$RES/$DIR"
              node -e "
                const sharp = require('sharp');
                sharp('$SRC')
                  .resize($SIZE, $SIZE)
                  .toFile('$RES/$DIR/ic_launcher.png')
                  .then(() => sharp('$SRC')
                    .resize($SIZE, $SIZE)
                    .toFile('$RES/$DIR/ic_launcher_round.png'))
                  .then(() => console.log('Generated $DIR'))
                  .catch(e => { console.error(e); process.exit(1); });
              "
            done
          }
          npm install sharp
          install_icons

      - name: Set up Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: violin-gym-tracker-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
