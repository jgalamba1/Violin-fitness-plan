name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Install sharp for icon generation
        run: npm install sharp

      - name: Generate Android icons
        run: |
          node << 'NODESCRIPT'
          const sharp = require('sharp');
          const path = require('path');
          const fs = require('fs');

          const SRC = 'public/icon-512.png';
          const RES = 'android/app/src/main/res';

          const sizes = {
            'mipmap-mdpi':    48,
            'mipmap-hdpi':    72,
            'mipmap-xhdpi':   96,
            'mipmap-xxhdpi':  144,
            'mipmap-xxxhdpi': 192,
          };

          async function run() {
            for (const [dir, size] of Object.entries(sizes)) {
              const outDir = path.join(RES, dir);
              fs.mkdirSync(outDir, { recursive: true });
              await sharp(SRC).resize(size, size).toFile(path.join(outDir, 'ic_launcher.png'));
              await sharp(SRC).resize(size, size).toFile(path.join(outDir, 'ic_launcher_round.png'));
              await sharp(SRC).resize(size, size).toFile(path.join(outDir, 'ic_launcher_foreground.png'));
              console.log(`Generated ${dir} (${size}x${size})`);
            }
            console.log('All icons generated successfully');
          }

          run().catch(e => { console.error(e); process.exit(1); });
          NODESCRIPT

      - name: Set up Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: violin-gym-tracker-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
