name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Install sharp for icon generation
        run: npm install sharp

      - name: Generate Android icons
        run: |
          cat > generate-icons.js << 'JSEOF'
          const sharp = require('sharp');
          const path = require('path');
          const fs = require('fs');

          const SRC = 'public/icon-512.png';
          const RES = 'android/app/src/main/res';

          // Legacy icon sizes (used by older Android)
          const sizes = {
            'mipmap-mdpi':    48,
            'mipmap-hdpi':    72,
            'mipmap-xhdpi':   96,
            'mipmap-xxhdpi':  144,
            'mipmap-xxxhdpi': 192,
          };

          // Adaptive icon foreground sizes (108dp canvas per Android spec)
          // Figure must fit within the 66dp safe zone = 61% of canvas
          const adaptiveSizes = {
            'mipmap-mdpi':    108,
            'mipmap-hdpi':    162,
            'mipmap-xhdpi':   216,
            'mipmap-xxhdpi':  324,
            'mipmap-xxxhdpi': 432,
          };

          const BG_COLOR = { r: 232, g: 223, b: 205, alpha: 1 };

          async function run() {
            // 1. Legacy icons (plain square/round)
            for (const [dir, size] of Object.entries(sizes)) {
              const outDir = path.join(RES, dir);
              fs.mkdirSync(outDir, { recursive: true });
              await sharp(SRC).resize(size, size).toFile(path.join(outDir, 'ic_launcher.png'));
              await sharp(SRC).resize(size, size).toFile(path.join(outDir, 'ic_launcher_round.png'));
              console.log('Legacy: ' + dir);
            }

            // 2. Adaptive foreground icons — figure scaled to 61% of canvas, centred
            for (const [dir, canvas] of Object.entries(adaptiveSizes)) {
              const outDir = path.join(RES, dir);
              fs.mkdirSync(outDir, { recursive: true });

              const figureSize = Math.round(canvas * 0.61);
              const offset = Math.round((canvas - figureSize) / 2);

              // Resize figure
              const figBuf = await sharp(SRC).resize(figureSize, figureSize).toBuffer();

              // Composite onto beige background canvas
              await sharp({
                create: { width: canvas, height: canvas, channels: 4,
                  background: BG_COLOR }
              })
              .composite([{ input: figBuf, top: offset, left: offset }])
              .png()
              .toFile(path.join(outDir, 'ic_launcher_foreground.png'));

              console.log('Adaptive foreground: ' + dir + ' (' + canvas + 'px canvas)');
            }

            // 3. Adaptive icon XML (Android 8+)
            const anydpiDir = path.join(RES, 'mipmap-anydpi-v26');
            fs.mkdirSync(anydpiDir, { recursive: true });

            const iconXml = `<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>`;

            fs.writeFileSync(path.join(anydpiDir, 'ic_launcher.xml'), iconXml);
            fs.writeFileSync(path.join(anydpiDir, 'ic_launcher_round.xml'), iconXml);
            console.log('Written adaptive icon XML');

            // 4. Background colour resource
            const valuesDir = path.join(RES, 'values');
            fs.mkdirSync(valuesDir, { recursive: true });
            const colorsXml = `<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#E8DFCD</color>
          </resources>`;
            fs.writeFileSync(path.join(valuesDir, 'ic_launcher_colors.xml'), colorsXml);
            console.log('Written background color resource');

            console.log('All icons generated successfully');
          }

          run().catch(e => { console.error(e); process.exit(1); });
          JSEOF
          node generate-icons.js

      - name: Set up Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Sign APK with consistent keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > violin-gym-tracker.jks
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks violin-gym-tracker.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out android/app/build/outputs/apk/debug/app-signed.apk \
            android/app/build/outputs/apk/debug/app-debug.apk
          rm violin-gym-tracker.jks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: violin-gym-tracker
          path: android/app/build/outputs/apk/debug/app-signed.apk
          retention-days: 30
